<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Queue System</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        :root {
            --blue: #2B5BA8;
            --green: #6AAC2B;
            --light-blue: #EEF3FB;
            --light-green: #F2F9EA;
        }

        body {
            background: #f4f6f9;
            font-family: 'Segoe UI', sans-serif;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        header {
            background: white;
            padding: 14px 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 4px solid var(--green);
            box-shadow: 0 2px 8px rgba(0,0,0,0.08);
        }

        .header-left {
            display: flex;
            align-items: center;
            gap: 16px;
        }

        #org-logo {
            height: 52px;
            max-width: 120px;
            object-fit: contain;
            display: none;
        }

        #org-name {
            font-size: 1.8rem;
            font-weight: 900;
            color: var(--blue);
            letter-spacing: 2px;
        }

        .logo-tagline {
            font-size: 0.75rem;
            color: #999;
            font-style: italic;
            margin-top: 2px;
        }

        .header-right { text-align: right; }
        .header-right #clock { font-size: 2rem; font-weight: 700; color: var(--blue); }
        .header-right #date { font-size: 0.85rem; color: #888; }

        .live-banner {
            background: var(--blue);
            color: white;
            padding: 10px 30px;
            font-size: 0.85rem;
            font-weight: 600;
            letter-spacing: 2px;
            text-transform: uppercase;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .live-left { display: flex; align-items: center; gap: 10px; }

        .blink {
            display: inline-block;
            width: 10px;
            height: 10px;
            background: var(--green);
            border-radius: 50%;
            animation: blink 1s infinite;
        }

        @keyframes blink {
            0%, 100% { opacity: 1; }
            50% { opacity: 0; }
        }

        .audio-btn {
            background: rgba(255,255,255,0.2);
            border: 1px solid rgba(255,255,255,0.4);
            color: white;
            padding: 6px 14px;
            border-radius: 16px;
            font-size: 0.75rem;
            font-weight: 600;
            cursor: pointer;
            letter-spacing: 1px;
            transition: background 0.2s;
        }

        .audio-btn:hover { background: rgba(255,255,255,0.3); }
        .audio-btn.active { background: var(--green); border-color: var(--green); }

        .main { flex: 1; padding: 20px 30px; }

        .counters-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 16px;
        }

        .counter-card {
            background: white;
            border-radius: 10px;
            overflow: hidden;
            box-shadow: 0 2px 8px rgba(0,0,0,0.06);
            border-top: 4px solid var(--blue);
        }

        .counter-header {
            background: var(--blue);
            color: white;
            padding: 12px 18px;
        }

        .counter-name { font-size: 1.1rem; font-weight: 700; }

        .counter-body { padding: 16px 18px; }

        .now-token {
            text-align: center;
            padding: 16px;
            background: var(--light-green);
            border-radius: 8px;
            margin-bottom: 12px;
            border: 2px solid var(--green);
        }

        .now-token .label {
            font-size: 0.75rem;
            color: #888;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .now-token .token-num {
            font-size: 2.5rem;
            font-weight: 900;
            color: var(--green);
            line-height: 1.1;
        }

        .counter-idle { text-align: center; padding: 20px; color: #bbb; font-size: 0.9rem; }

        .waiting-label {
            font-size: 0.75rem;
            color: #888;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 8px;
        }

        .waiting-tokens { display: flex; flex-wrap: wrap; gap: 6px; }

        .waiting-token {
            padding: 5px 12px;
            border-radius: 20px;
            font-size: 0.85rem;
            font-weight: 600;
        }

        .waiting-token.emergency { background: #fdecea; color: #c62828; border: 1px solid #ef9a9a; }
        .waiting-token.urgent    { background: #fff3e0; color: #e65100; border: 1px solid #ffcc80; }
        .waiting-token.normal    { background: var(--light-blue); color: var(--blue); border: 1px solid #90caf9; }

        .no-waiting { color: #ccc; font-size: 0.85rem; }

        footer {
            background: white;
            border-top: 3px solid var(--blue);
            padding: 10px 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 0.8rem;
            color: #888;
        }

        footer span { color: var(--blue); font-weight: 600; }
    </style>
</head>
<body>

<header>
    <div class="header-left">
        <img id="org-logo" src="" alt="Logo" />
        <div>
            <div id="org-name">Queue System</div>
            <div class="logo-tagline">Queue Management System</div>
        </div>
    </div>
    <div class="header-right">
        <div id="clock">--:--:--</div>
        <div id="date"></div>
    </div>
</header>

<div class="live-banner">
    <div class="live-left">
        <span class="blink"></span>
        Queue Management System — Live View
    </div>
    <button class="audio-btn" id="audio-btn" onclick="toggleAudio()">🔇 Audio Off</button>
</div>

<div class="main">
    <div class="counters-grid" id="counters-grid">
        <div style="color:#aaa; padding:40px; text-align:center;">Loading...</div>
    </div>
</div>

<footer>
    <div id="footer-name">Queue Management System</div>
    <div>Auto-refreshes every <span>5 seconds</span></div>
</footer>

<script>
    // ── CLOCK ──
    function updateClock() {
        const now = new Date();
        document.getElementById('clock').textContent = now.toLocaleTimeString();
        document.getElementById('date').textContent = now.toLocaleDateString('en-KE', {
            weekday: 'long', year: 'numeric', month: 'long', day: 'numeric'
        });
    }
    setInterval(updateClock, 1000);
    updateClock();

    // ── AUDIO ──
    let _soundEnabled = false;
    let _lastServing = new Set();

    function toggleAudio() {
        _soundEnabled = !_soundEnabled;
        const btn = document.getElementById('audio-btn');
        btn.textContent = _soundEnabled ? '🔊 Audio On' : '🔇 Audio Off';
        btn.classList.toggle('active', _soundEnabled);

        // Speak a test phrase so browser unlocks audio
        if (_soundEnabled && 'speechSynthesis' in window) {
            const test = new SpeechSynthesisUtterance('Audio enabled');
            test.volume = 0.1;
            window.speechSynthesis.speak(test);
        }
    }

    function announceToken(token, counterName) {
        if (!_soundEnabled) return;
        if (!('speechSynthesis' in window)) return;
        window.speechSynthesis.cancel();
        const text = `Token ${token.split('').join(' ')}, please proceed to ${counterName}`;
        const msg = new SpeechSynthesisUtterance(text);
        msg.rate = 0.85;
        msg.pitch = 1;
        msg.volume = 1;
        window.speechSynthesis.speak(msg);
    }

    function checkNewlyServing(serving) {
        serving.forEach(s => {
            const key = s.token_number + '_' + (s.counter || s.room);
            if (!_lastServing.has(key)) {
                announceToken(s.token_number, s.counter || s.room || 'the counter');
            }
        });
        _lastServing = new Set(serving.map(s => s.token_number + '_' + (s.counter || s.room)));
    }

    // ── LOAD SETTINGS ──
    fetch('/api/method/hqs.hqs.api.get_qms_settings')
        .then(r => r.json())
        .then(d => {
            if (!d.message) return;
            const s = d.message;

            if (s.organization_name) {
                document.getElementById('org-name').textContent = s.organization_name;
                document.getElementById('footer-name').textContent = s.organization_name + ' — Queue Management System';
                document.title = s.organization_name + ' — Queue System';
            }

            if (s.logo) {
                const img = document.getElementById('org-logo');
                img.src = s.logo;
                img.style.display = 'block';
            }

            // Auto-enable audio if set in settings
            if (s.enable_sound && !_soundEnabled) {
                _soundEnabled = true;
                const btn = document.getElementById('audio-btn');
                btn.textContent = '🔊 Audio On';
                btn.classList.add('active');
            }
        })
        .catch(() => {});

    // ── FETCH QUEUE ──
    function fetchQueue() {
        fetch('/api/method/hqs.hqs.api.get_queue_dashboard')
            .then(res => res.json())
            .then(data => {
                if (data.message) renderCounters(data.message);
            })
            .catch(err => console.error('Queue fetch error:', err));
    }

    // ── RENDER — counter name only, no room shown ──
    function renderCounters({ counters, serving, waiting }) {
        // Check for newly called tokens and announce them
        checkNewlyServing(serving);

        const grid = document.getElementById('counters-grid');

        if (!counters || counters.length === 0) {
            grid.innerHTML = '<div style="color:#aaa;padding:40px;text-align:center;">No active counters found</div>';
            return;
        }

        grid.innerHTML = counters.map(counter => {
            // Match serving by counter name
            const current = serving.find(s => s.counter === counter.counter_name);

            // Match waiting by room — internal only, not shown to patient
            const roomWaiting = waiting.filter(w => w.room === counter.room);

            const nowServingHTML = current ? `
                <div class="now-token">
                    <div class="label">Now Serving</div>
                    <div class="token-num">${current.token_number}</div>
                </div>
            ` : `<div class="counter-idle">— Available —</div>`;

            const waitingHTML = roomWaiting.length > 0 ? `
                <div class="waiting-label">Waiting (${roomWaiting.length})</div>
                <div class="waiting-tokens">
                    ${roomWaiting.map(w => `
                        <span class="waiting-token ${(w.priority || 'normal').toLowerCase()}">${w.token_number}</span>
                    `).join('')}
                </div>
            ` : `<div class="no-waiting">No patients waiting</div>`;

            return `
                <div class="counter-card">
                    <div class="counter-header">
                        <div class="counter-name">${counter.counter_name}</div>
                    </div>
                    <div class="counter-body">
                        ${nowServingHTML}
                        ${waitingHTML}
                    </div>
                </div>
            `;
        }).join('');
    }

    fetchQueue();
    setInterval(fetchQueue, 5000);
</script>

</body>
</html>
