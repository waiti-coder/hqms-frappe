<!-- HQS Reports Page -->
<div class="hqs-reports-page">

  <!-- KPI SUMMARY CARDS -->
  <div class="hqs-kpi-row">

    <div class="hqs-kpi-card hqs-kpi-blue" data-kpi="total-patients">
      <div class="hqs-kpi-icon"><i class="fa fa-users"></i></div>
      <div class="hqs-kpi-content">
        <div class="hqs-kpi-value">–</div>
        <div class="hqs-kpi-label">Total Patients</div>
      </div>
    </div>

    <div class="hqs-kpi-card hqs-kpi-green" data-kpi="male">
      <div class="hqs-kpi-icon"><i class="fa fa-male"></i></div>
      <div class="hqs-kpi-content">
        <div class="hqs-kpi-value">–</div>
        <div class="hqs-kpi-label">Male</div>
      </div>
    </div>

    <div class="hqs-kpi-card hqs-kpi-pink" data-kpi="female">
      <div class="hqs-kpi-icon"><i class="fa fa-female"></i></div>
      <div class="hqs-kpi-content">
        <div class="hqs-kpi-value">–</div>
        <div class="hqs-kpi-label">Female</div>
      </div>
    </div>

    <div class="hqs-kpi-card hqs-kpi-orange" data-kpi="with-uid">
      <div class="hqs-kpi-icon"><i class="fa fa-id-card"></i></div>
      <div class="hqs-kpi-content">
        <div class="hqs-kpi-value">–</div>
        <div class="hqs-kpi-label">With UID</div>
      </div>
    </div>

    <div class="hqs-kpi-card hqs-kpi-purple" data-kpi="with-email">
      <div class="hqs-kpi-icon"><i class="fa fa-envelope"></i></div>
      <div class="hqs-kpi-content">
        <div class="hqs-kpi-value">–</div>
        <div class="hqs-kpi-label">With Email</div>
      </div>
    </div>

  </div>

  <!-- CHARTS ROW -->
  <div class="hqs-charts-row">

    <div class="hqs-card">
      <div class="hqs-card-header">
        <span>Daily Registrations</span>
        <span class="hqs-card-badge" id="hqs-period-label"></span>
      </div>
      <div id="hqs-daily-chart" style="min-height: 240px;"></div>
    </div>

    <div class="hqs-card">
      <div class="hqs-card-header">
        <span>Gender Distribution</span>
      </div>
      <div id="hqs-gender-chart" style="min-height: 240px;"></div>
    </div>

  </div>

  <!-- AGE CHART -->
  <div class="hqs-card">
    <div class="hqs-card-header">
      <span>Age Group Distribution</span>
    </div>
    <div id="hqs-age-chart" style="min-height: 200px;"></div>
  </div>

  <!-- DETAIL TABLE -->
  <div class="hqs-card">
    <div class="hqs-card-header">
      <span>Patient Records</span>
      <span class="hqs-record-count" id="hqs-record-count"></span>
    </div>
    <div id="hqs-datatable" class="hqs-datatable-wrap"></div>
  </div>

  <!-- LOADING OVERLAY -->
  <div id="hqs-loading" class="hqs-loading-overlay" style="display: none;">
    <div class="hqs-spinner"></div>
    <span>Loading report data…</span>
  </div>

</div>
